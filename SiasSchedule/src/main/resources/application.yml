# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /

# Spring配置
spring:
  application:
    name: sias-schedule-assistant

  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/sias_schedule?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

# MyBatis配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.sias.schedule.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 爬虫脚本配置
# 爬虫脚本配置
crawler:
  python:
    # ⚠️ 这里目前写的是 D:\python\python.exe
    # 你之前提到你的环境是 D:\Py-project\.venv\Scripts\python.exe
    # 请务必修改为你的真实路径！
    path: D:\python\python.exe
    script-path: classpath:scripts/crawler.py
    timeout: 30

# 日志配置
logging:
  level:
    com.sias.schedule: DEBUG
