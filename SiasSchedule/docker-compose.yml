version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: sias-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-your_password}
      MYSQL_DATABASE: sias_schedule
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - sias-network

  # Spring Boot 应用
  app:
    build: .
    container_name: sias-schedule
    restart: always
    depends_on:
      - mysql
    environment:
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-your_password}
      PYTHON_PATH: python3
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/sias_schedule?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    ports:
      - "8080:8080"
    networks:
      - sias-network

volumes:
  mysql_data:

networks:
  sias-network:
    driver: bridge

